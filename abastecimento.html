<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestao de Fluxo e Producao - Visia</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1A2540">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3','Segoe UI',Arial,sans-serif;background:#F4F6F9;color:#1A2540;min-height:100vh;}
.top{background:#1A2540;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:20;}
.top img{height:26px;}
.top h1{font-size:17px;font-weight:700;flex:1;}
.nav-voltar{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;text-decoration:none;}
.nav-voltar:hover{background:rgba(255,255,255,.2);}
.filtros{background:#fff;border-bottom:1px solid #E3E8EF;padding:10px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;position:sticky;top:52px;z-index:15;}
.fbtn{padding:7px 16px;border:1px solid #D8DCE3;background:#EEF0F4;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;color:#374151;}
.fbtn.on{background:#185FA5;color:#fff;border-color:#185FA5;}
.legenda{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:#6B7280;margin-left:auto;align-items:center;}
.lg{display:inline-flex;align-items:center;gap:4px;}
.dot{width:11px;height:11px;border-radius:3px;display:inline-block;}
.wrap{padding:14px 18px 80px;}
/* GRID AUTO-AJUSTAVEL: quanto mais cards, mais colunas (cards menores) */
.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(var(--cardmin,300px),1fr));}
.card{background:#fff;border:1px solid #E3E8EF;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;}
.card.concluido{opacity:.6;}
.card-head{background:#F5F7FA;padding:10px 13px;border-bottom:1px solid #E3E8EF;}
.card-head .nome{font-size:14px;font-weight:800;color:#12233A;line-height:1.15;}
.card-head .meta{font-size:10px;color:#6B7280;margin-top:2px;}
.card-chk{width:20px;height:20px;border-radius:5px;border:2px solid #C4CDD8;background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.card-chk.on{background:#185FA5;border-color:#185FA5;}
.card-chk.partial{background:#93B4D6;border-color:#93B4D6;}
.card-head:hover .card-chk{border-color:#185FA5;}
.card-body{padding:6px 8px;display:flex;flex-direction:column;gap:4px;}
.peca{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:7px;border:1px solid #E7EBF0;background:#fff;cursor:pointer;}
.peca:hover{background:#F7F9FB;}
.peca .pdot{width:12px;height:12px;border-radius:4px;flex-shrink:0;}
.peca .pnome{flex:1;font-size:12px;font-weight:600;}
.peca .pmeta{font-size:9px;color:#9CA3AF;}
.peca .psetor{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;background:#EEF2F7;color:#185FA5;}
.peca.sel{outline:2px solid #185FA5;background:#EFF5FC;}
/* estados base */
.e-a_produzir .pdot{background:#C4CDD8;}
.e-produzida .pdot{background:#1D9E75;}
.e-entregue .pdot{background:#185FA5;}
/* CORES INVERTIDAS: amarelo=fabricada a transportar; vermelho=nao fabricada a transportar */
.solicitado.produzida{animation:piscaAmarelo 1s infinite;}
.solicitado.a_produzir{animation:piscaVermelho 1s infinite;}
@keyframes piscaAmarelo{0%,100%{background:#fff;}50%{background:#FFF3C4;}}
@keyframes piscaVermelho{0%,100%{background:#fff;}50%{background:#FDDADA;}}
.barra-acao{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E3E8EF;padding:12px 20px;display:none;align-items:center;gap:12px;box-shadow:0 -4px 16px rgba(0,0,0,.06);z-index:30;}
.barra-acao.show{display:flex;}
.barra-acao .info{font-size:13px;font-weight:700;flex:1;}
.btn-sol{padding:11px 22px;background:#E24B4A;border:none;border-radius:9px;color:#fff;font-size:14px;font-weight:800;cursor:pointer;}
.btn-limpar{padding:11px 18px;background:#EEF0F4;border:none;border-radius:9px;color:#374151;font-size:13px;font-weight:700;cursor:pointer;}
.status-msg{padding:8px 20px;font-size:12px;color:#6B7280;}
.vazio{text-align:center;color:#9CA3AF;padding:50px;font-size:14px;grid-column:1/-1;}
/* modais */
.overlay{position:fixed;inset:0;background:rgba(15,22,38,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:16px;padding:26px;max-width:360px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3);}
.modal h2{font-size:17px;margin-bottom:6px;text-align:center;}
.modal p{font-size:13px;color:#6B7280;text-align:center;margin-bottom:18px;}
.modal label{font-size:11px;color:#6B7280;display:block;margin-bottom:4px;}
.modal input{width:100%;padding:10px;border:1px solid #D8DCE3;border-radius:8px;font-size:14px;margin-bottom:14px;}
.modal .erro{color:#E24B4A;font-size:12px;text-align:center;min-height:16px;margin-top:8px;}
.mbtns{display:flex;gap:8px;}
.mbtns button{flex:1;padding:11px;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;}
.mb-cancel{background:#EEF0F4;color:#374151;}
.mb-ok{background:#185FA5;color:#fff;flex:2;}
</style>
</head>

<script>
const URL='https://script.google.com/macros/s/AKfycbyRmbuI33AEe4LJObYZZ4WPujjc3fyzAzHHMd1kli1pUQaar-Y99xulhfRgixecuoW0/exec';
const PERFIS_SOLICITA=['solicitante','gestao_fluxo','todos','master'];
let MODULOS=[];
let FILTRO='todos';
let SEL={};

let _cb=0;
function jsonp(params){
  return new Promise((res,rej)=>{
    const cb='__cb'+(_cb++);
    const s=document.createElement('script');
    const to=setTimeout(()=>{cleanup();rej(new Error('timeout'));},15000);
    function cleanup(){clearTimeout(to);delete window[cb];s.remove();}
    window[cb]=d=>{cleanup();res(d);};
    s.onerror=()=>{cleanup();rej(new Error('erro'));};
    s.src=URL+(URL.includes('?')?'&':'?')+params+'&callback='+cb+'&t='+Date.now();
    document.body.appendChild(s);
  });
}
async function api(params){
  try{ return await jsonp(params); }catch(_){}
  try{ const r=await fetch(URL+(URL.includes('?')?'&':'?')+params+'&t='+Date.now(),{cache:'no-store'}); if(r.ok) return JSON.parse(await r.text()); }catch(_){}
  return null;
}

function setFiltro(f,btn){
  FILTRO=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function pecaVisivel(pc){
  if(FILTRO==='todos') return true;
  return (pc.setor_fabrica||'').toUpperCase()===FILTRO;
}

function ajustarTamanhoCards(qtd){
  // quanto mais cards, menores as colunas (auto-ajuste)
  let min;
  if(qtd<=8) min=340;
  else if(qtd<=16) min=300;
  else if(qtd<=28) min=260;
  else if(qtd<=45) min=220;
  else min=190;
  document.querySelector('.grid').style.setProperty('--cardmin', min+'px');
}

function render(){
  const grid=document.getElementById('grid');
  const modsVisiveis=MODULOS.filter(m=>m.pecas.filter(pecaVisivel).length>0);
  ajustarTamanhoCards(modsVisiveis.length);
  const cards=modsVisiveis.map(m=>{
    const pecasFiltradas=m.pecas.filter(pecaVisivel);
    const concluido=m._entregue?' concluido':'';
    // linhas selecionáveis deste card (peças que ainda não foram entregues)
    const linhasSelec=pecasFiltradas.filter(pc=>pc.linha && pc.estado!=='entregue').map(pc=>pc.linha);
    const todasSel = linhasSelec.length>0 && linhasSelec.every(ln=>SEL[ln]);
    const algumaSel = linhasSelec.some(ln=>SEL[ln]);
    const linhas=pecasFiltradas.map(pc=>{
      const cls='e-'+pc.estado+(pc.solicitado?' solicitado '+pc.estado:'');
      const selCls=(pc.linha && SEL[pc.linha])?' sel':'';
      const setorTag=pc.setor_fabrica?`<span class="psetor">${pc.setor_fabrica}</span>`:'';
      const data=pc.data_fab?`fab ${pc.data_fab}`:'';
      const podeselecionar = pc.linha && pc.estado!=='entregue';
      return `<div class="peca ${cls}${selCls}" ${podeselecionar?`onclick="toggleSel(${pc.linha})"`:''}>
        <span class="pdot"></span>
        <span class="pnome">${pc.id}</span>
        ${setorTag}
        <span class="pmeta">${data}</span>
      </div>`;
    }).join('');
    // caixa de seleção do card inteiro
    const chk = linhasSelec.length>0
      ? `<span class="card-chk ${todasSel?'on':(algumaSel?'partial':'')}">${todasSel?'&#10003;':(algumaSel?'&#8211;':'')}</span>`
      : '';
    const headClick = linhasSelec.length>0 ? `onclick='toggleCard(${JSON.stringify(linhasSelec)})' style="cursor:pointer;"` : '';
    return `<div class="card${concluido}">
      <div class="card-head" ${headClick}>
        <div style="display:flex;align-items:center;gap:8px;">
          ${chk}
          <div style="flex:1;">
            <div class="nome">${m.id_produto} - ${m.nome_produto}</div>
            <div class="meta">Entrada: ${m.data_entrada||'-'} - ${pecasFiltradas.length} peca(s)${linhasSelec.length>0?' - toque no titulo p/ selecionar tudo':''}</div>
          </div>
        </div>
      </div>
      <div class="card-body">${linhas}</div>
    </div>`;
  }).join('');
  grid.innerHTML=cards||'<div class="vazio">Nenhuma peca para este filtro.</div>';
  atualizarBarra();
}

function toggleSel(linha){
  if(SEL[linha]) delete SEL[linha]; else SEL[linha]=true;
  render();
}
// seleciona/desmarca todas as peças selecionáveis de um card
function toggleCard(linhas){
  const todasSel = linhas.every(ln=>SEL[ln]);
  if(todasSel){ linhas.forEach(ln=>delete SEL[ln]); }   // já tudo marcado → desmarca tudo
  else { linhas.forEach(ln=>SEL[ln]=true); }             // marca tudo
  render();
}
function limparSel(){ SEL={}; render(); }
function atualizarBarra(){
  const n=Object.keys(SEL).length;
  document.getElementById('barra-info').textContent=n+' peca(s) selecionada(s)';
  document.getElementById('barra').classList.toggle('show',n>0);
}

/* ---- Solicitacao com login + confirmacao ---- */
function podeSolicitar(){
  const perfil=(sessionStorage.getItem('visia_perfil')||'').toLowerCase();
  if(!sessionStorage.getItem('visia_user')) return false;
  if(perfil.includes('todos')||perfil.includes('master')) return true;
  return PERFIS_SOLICITA.some(p=>perfil.split(',').map(x=>x.trim()).includes(p));
}

function pedirSolicitacao(){
  const n=Object.keys(SEL).length;
  if(n===0) return;
  // ja logado e com permissao? vai direto pra confirmacao
  if(podeSolicitar()){ confirmarSolicitacao(); return; }
  // senao, pede login
  abrirLogin();
}

function abrirLogin(){
  const ov=document.createElement('div');
  ov.className='overlay'; ov.id='ov-login';
  ov.innerHTML=`<div class="modal">
    <h2>Acesso para solicitar</h2>
    <p>Entre com um usuario autorizado a solicitar transporte</p>
    <label>Usuario</label><input id="lg-user" onkeydown="if(event.key==='Enter')fazerLoginSol()">
    <label>Senha</label><input id="lg-pass" type="password" onkeydown="if(event.key==='Enter')fazerLoginSol()">
    <div class="mbtns">
      <button class="mb-cancel" onclick="fecharOv('ov-login')">Cancelar</button>
      <button class="mb-ok" onclick="fazerLoginSol()">Entrar</button>
    </div>
    <div class="erro" id="lg-erro"></div>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById('lg-user').focus();
}
async function fazerLoginSol(){
  const u=document.getElementById('lg-user').value.trim();
  const p=document.getElementById('lg-pass').value.trim();
  const erro=document.getElementById('lg-erro');
  if(!u||!p){ erro.textContent='Preencha usuario e senha.'; return; }
  erro.textContent='Verificando...';
  const r=await api('action=login&usuario='+encodeURIComponent(u)+'&senha='+encodeURIComponent(p));
  if(r&&r.ok){
    sessionStorage.setItem('visia_user',r.usuario);
    sessionStorage.setItem('visia_nome',r.nome||r.usuario);
    sessionStorage.setItem('visia_perfil',r.perfil||'');
    fecharOv('ov-login');
    mostrarUser();
    if(podeSolicitar()){ confirmarSolicitacao(); }
    else{ alert('Este usuario nao tem permissao para solicitar transporte.'); }
  }else{ erro.textContent=(r&&r.erro)||'Falha no login.'; }
}

function confirmarSolicitacao(){
  const n=Object.keys(SEL).length;
  const ov=document.createElement('div');
  ov.className='overlay'; ov.id='ov-conf';
  ov.innerHTML=`<div class="modal">
    <h2>Confirmar solicitacao</h2>
    <p>Voce esta prestes a solicitar o transporte de <strong>${n} peca(s)</strong>.<br>A logistica sera avisada. Tem certeza?</p>
    <div class="mbtns">
      <button class="mb-cancel" onclick="fecharOv('ov-conf')">Cancelar</button>
      <button class="mb-ok" onclick="efetivarSolicitacao()">Sim, solicitar</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
}
function fecharOv(id){ const o=document.getElementById(id); if(o) o.remove(); }

async function efetivarSolicitacao(){
  fecharOv('ov-conf');
  const linhas=Object.keys(SEL).map(Number);
  if(linhas.length===0) return;
  const u=sessionStorage.getItem('visia_user')||'';
  document.getElementById('status').textContent='Solicitando...';
  const r=await api('action=solicitar&linhas='+encodeURIComponent(JSON.stringify(linhas))+(u?'&usuario='+encodeURIComponent(u):''));
  if(r&&r.ok){ SEL={}; await carregar(); document.getElementById('status').textContent=r.solicitadas+' peca(s) solicitada(s) - logistica avisada.'; }
  else{ document.getElementById('status').textContent='Falha ao solicitar.'; }
}

function mostrarUser(){
  const el=document.getElementById('user-lbl');
  const nome=sessionStorage.getItem('visia_nome');
  if(el) el.textContent = nome ? ('Logado: '+nome) : '';
}

async function carregar(){
  document.getElementById('status').textContent='Carregando...';
  const r=await api('action=abastecimento');
  if(Array.isArray(r)){
    MODULOS=r; render();
    document.getElementById('status').textContent=MODULOS.length+' modulo(s) - atualizado as '+new Date().toLocaleTimeString('pt-BR');
  }else{ document.getElementById('status').textContent='Erro ao carregar. Verifique o script.'; }
}
mostrarUser();
carregar();
setInterval(carregar, 30000);
</script>
