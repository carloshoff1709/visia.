<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#EEF1F5;color:#1A2540;padding-bottom:60px;}
.top{background:#1A2540;color:#fff;padding:14px 18px;position:sticky;top:0;z-index:10;}
.top h1{font-size:16px;font-weight:700;}
.top .st{font-size:11px;opacity:.7;margin-top:2px;}
.busca{padding:10px 18px;background:#fff;border-bottom:1px solid #E1E6EC;position:sticky;top:52px;z-index:9;}
.busca input{width:100%;padding:10px 12px;border:1px solid #D8DCE3;border-radius:8px;font-size:14px;}
.busca input:focus{outline:none;border-color:#185FA5;}
.resumo{display:flex;gap:10px;padding:10px 18px;font-size:12px;}
.resumo .r{flex:1;text-align:center;padding:8px;border-radius:8px;font-weight:600;}
.resumo .disp{background:#DCFCE7;color:#166534;}
.resumo .falt{background:#FEE2E2;color:#991B1B;}
.lista{padding:6px 14px;}
.item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border:1px solid #E1E6EC;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.item .info{flex:1;min-width:0;}
.item .id{font-size:14px;font-weight:700;}
.item .nome{font-size:12px;color:#6B7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.toggle{border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;min-width:118px;transition:transform .05s;}
.toggle:active{transform:scale(.95);}
.toggle.disp{background:#1D9E75;color:#fff;}
.toggle.falt{background:#E24B4A;color:#fff;}
.msg{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;display:none;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.2);}
.msg.ok{background:#1D9E75;} .msg.err{background:#E24B4A;} .msg.load{background:#185FA5;}
.empty{text-align:center;color:#9CA3AF;padding:40px 20px;font-size:13px;}
.refresh{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;float:right;margin-top:-20px;}

/* --- Login + Navegação --- */
#login-overlay{position:fixed;inset:0;background:linear-gradient(160deg,#0F1626,#1A2540);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
#login-box{background:#fff;border-radius:16px;padding:30px;max-width:340px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3);}
#login-box h2{font-size:18px;color:#1A2540;margin-bottom:4px;text-align:center;}
#login-box p{font-size:12px;color:#6B7280;text-align:center;margin-bottom:20px;}
#login-box label{font-size:11px;color:#6B7280;display:block;margin-bottom:4px;}
#login-box input{width:100%;padding:10px;border:1px solid #D8DCE3;border-radius:8px;font-size:14px;margin-bottom:14px;}
#login-box input:focus{outline:none;border-color:#185FA5;}
#login-box button{width:100%;padding:11px;background:#185FA5;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
#login-erro{color:#E24B4A;font-size:12px;text-align:center;margin-top:10px;min-height:16px;}
.nav-voltar{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;text-decoration:none;margin-right:12px;}
.nav-voltar:hover{background:rgba(255,255,255,.2);}
.nav-user{font-size:11px;color:rgba(255,255,255,.7);margin-left:8px;}

</style>
</head>
<body>

<div id="login-overlay">
  <div id="login-box">
    <h2>🔒 Acesso restrito</h2>
    <p>Entre com seu usuário para continuar</p>
    <label>Usuário</label>
    <input id="login-user" autocomplete="username" onkeydown="if(event.key==='Enter')fazerLogin()">
    <label>Senha</label>
    <input id="login-pass" type="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')fazerLogin()">
    <button onclick="fazerLogin()">Entrar</button>
    <div id="login-erro"></div>
  </div>
</div>

<script>
const URL='https://script.google.com/macros/s/AKfycbyRmbuI33AEe4LJObYZZ4WPujjc3fyzAzHHMd1kli1pUQaar-Y99xulhfRgixecuoW0/exec';
let PECAS=[];

let _cb=0;
function jsonp(params){
  return new Promise((res,rej)=>{
    const cb='__cb'+(_cb++);
    const s=document.createElement('script');
    const to=setTimeout(()=>{cleanup();rej(new Error('timeout'));},15000);
    function cleanup(){clearTimeout(to);delete window[cb];s.remove();}
    window[cb]=d=>{cleanup();res(d);};
    s.onerror=()=>{cleanup();rej(new Error('erro'));};
    s.src=URL+(URL.includes('?')?'&':'?')+params+'&callback='+cb+'&t='+Date.now();
    document.body.appendChild(s);
  });
}
async function api(params){
  // JSONP primeiro (contorna CORS do Apps Script); fetch como fallback
  try{ return await jsonp(params); }catch(_){}
  const full=URL+(URL.includes('?')?'&':'?')+params+'&t='+Date.now();
  try{ const r=await fetch(full,{cache:'no-store'}); if(r.ok){ return JSON.parse(await r.text()); } }catch(_){}
  const proxies=[
    u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,
    u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`
  ];
  for(const px of proxies){
    try{ const r=await fetch(px(full),{cache:'no-store'}); if(r.ok){ return JSON.parse(await r.text()); } }catch(_){}
  }
  return null;
}

/* --- LOGIN + SESSÃO --- */
let USUARIO_LOGADO = sessionStorage.getItem('visia_user') || '';
function checarLogin(){
  if(USUARIO_LOGADO){ document.getElementById('login-overlay').style.display='none'; mostrarUsuario(); }
  else { document.getElementById('login-overlay').style.display='flex'; }
}
async function fazerLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value.trim();
  const erro=document.getElementById('login-erro');
  if(!u||!p){ erro.textContent='Preencha usuário e senha.'; return; }
  erro.textContent='Verificando...';
  const r=await api('action=login&usuario='+encodeURIComponent(u)+'&senha='+encodeURIComponent(p));
  if(r&&r.ok){
    USUARIO_LOGADO=r.usuario;
    sessionStorage.setItem('visia_user',r.usuario);
    sessionStorage.setItem('visia_nome',r.nome||r.usuario);
    document.getElementById('login-overlay').style.display='none';
    erro.textContent='';
    mostrarUsuario();
    if(typeof aoLogar==='function') aoLogar();
  } else {
    erro.textContent=(r&&r.erro)||'Falha no login.';
  }
}
function mostrarUsuario(){
  const el=document.getElementById('nav-user-label');
  if(el) el.textContent='👤 '+(sessionStorage.getItem('visia_nome')||USUARIO_LOGADO);
}
function sair(){ sessionStorage.removeItem('visia_user'); sessionStorage.removeItem('visia_nome'); location.reload(); }

function msg(t,txt){const m=document.getElementById('msg');m.className='msg '+t;m.textContent=txt;m.style.display='block';if(t!=='load')setTimeout(()=>m.style.display='none',2500);}

async function carregar(){
  document.getElementById('status').textContent='Carregando…';
  const lista=await api('action=listar_pecas');
  if(!Array.isArray(lista)){ document.getElementById('status').textContent='Erro ao carregar'; return; }
  PECAS=lista;
  render();
}

function render(){
  const termo=(document.getElementById('busca').value||'').toLowerCase();
  const filtradas=PECAS.filter(p=>!termo || (p.id_peca||'').toLowerCase().includes(termo) || (p.nome_peca||'').toLowerCase().includes(termo));
  const cont=document.getElementById('lista');
  const empty=document.getElementById('empty');

  const disp=PECAS.filter(p=>p.status==='Disponivel').length;
  const falt=PECAS.length-disp;
  document.getElementById('r-disp').textContent='✅ '+disp+' disponíveis';
  document.getElementById('r-falt').textContent='❌ '+falt+' faltando';
  document.getElementById('status').textContent=PECAS.length+' peça(s)';

  if(PECAS.length===0){ cont.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  cont.innerHTML=filtradas.map(p=>{
    const d=p.status==='Disponivel';
    const local = d && (p.setor||p.posicao)
      ? `<div style="font-size:11px;color:#166534;margin-top:2px;">📍 ${p.setor||'—'}${p.posicao?' · Varal '+p.posicao:''}</div>`
      : '';
    return `<div class="item">
      <div class="info">
        <div class="id">${p.id_peca}</div>
        <div class="nome">${p.nome_peca||'—'}</div>
        ${local}
      </div>
      <button class="toggle ${d?'disp':'falt'}" onclick="cliqueToggle(${p.linha},'${p.id_peca}',${d?1:0})">
        ${d?'✅ Disponível':'❌ Faltando'}
      </button>
      <button onclick="mostrarCodigo('${p.id_peca}','${(p.nome_peca||'').replace(/'/g,"\\'")}','${p.serial||''}')" style="border:1px solid #D8DCE3;background:#fff;border-radius:8px;padding:8px 10px;font-size:16px;cursor:pointer;margin-left:6px;" title="Gerar código">▦</button>
    </div>`;
  }).join('');
}

/* Se está Faltando e vai marcar Disponível → pede setor/posição.
   Se está Disponível e vai marcar Faltando → alterna direto. */
function cliqueToggle(linha,id,estaDisp){
  if(estaDisp){ alternar(linha,id,'',''); }   // Disponível → Faltando, direto
  else{ abrirLocalizacao(linha,id); }          // Faltando → Disponível, pede local
}

let _modalLoc=null;
function abrirLocalizacao(linha,id){
  fecharLocalizacao();
  const setores=['CAD','Montagem','GRC'];
  const posicoes=[1,2,3,4,5];
  const m=document.createElement('div');
  m.id='modal-loc';
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;';
  m.innerHTML=`
    <div style="background:#fff;border-radius:14px;padding:20px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.25);">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:4px;">✅ Marcar disponível</h3>
      <p style="font-size:12px;color:#6B7280;margin-bottom:14px;">Peça <strong>${id}</strong> — onde está guardada?</p>
      <div style="font-size:11px;color:#6B7280;margin-bottom:5px;">Setor:</div>
      <div id="loc-setores" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
        ${setores.map(s=>`<button onclick="selSetor(this,'${s}')" data-s="${s}" style="flex:1;min-width:80px;padding:10px;border:1px solid #D8DCE3;background:#EEF0F4;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">${s}</button>`).join('')}
      </div>
      <div id="loc-varal-wrap" style="display:none;">
        <div style="font-size:11px;color:#6B7280;margin-bottom:5px;">Local na Montagem:</div>
        <div id="loc-pos" style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:6px;">
          ${posicoes.map(n=>`<button onclick="selPos(this,'${n}')" data-p="${n}" style="padding:12px 0;border:1px solid #D8DCE3;background:#EEF0F4;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;">${n}</button>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:16px;">
          <button onclick="selPos(this,'Buffer Teto')" data-p="Buffer Teto" style="padding:12px 0;border:1px solid #D8DCE3;background:#EEF0F4;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">📦 Buffer Teto</button>
          <button onclick="selPos(this,'Buffer Piso')" data-p="Buffer Piso" style="padding:12px 0;border:1px solid #D8DCE3;background:#EEF0F4;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">📦 Buffer Piso</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button onclick="fecharLocalizacao()" style="flex:1;padding:10px;background:#EEF0F4;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Cancelar</button>
        <button id="loc-ok" onclick="confirmarLocalizacao(${linha},'${id}')" style="flex:2;padding:10px;background:#1D9E75;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;">Confirmar disponível</button>
      </div>
    </div>`;
  document.body.appendChild(m);
  _modalLoc={setor:'',pos:''};
}
function selSetor(btn,s){
  _modalLoc.setor=s;
  _modalLoc.pos=''; // reseta a posição ao trocar de setor
  document.querySelectorAll('#loc-setores button').forEach(b=>{b.style.background='#EEF0F4';b.style.color='#1A2540';b.style.borderColor='#D8DCE3';});
  btn.style.background='#1D9E75';btn.style.color='#fff';btn.style.borderColor='#1D9E75';
  // varal só para Montagem
  const wrap=document.getElementById('loc-varal-wrap');
  if(wrap){
    if(s.toLowerCase()==='montagem'){ wrap.style.display='block'; }
    else{ wrap.style.display='none';
      document.querySelectorAll('#loc-pos button').forEach(b=>{b.style.background='#EEF0F4';b.style.color='#1A2540';b.style.borderColor='#D8DCE3';});
    }
  }
}
function selPos(btn,n){
  _modalLoc.pos=n;
  document.querySelectorAll('#loc-varal-wrap button[data-p]').forEach(b=>{b.style.background='#EEF0F4';b.style.color='#1A2540';b.style.borderColor='#D8DCE3';});
  btn.style.background='#185FA5';btn.style.color='#fff';btn.style.borderColor='#185FA5';
}
function fecharLocalizacao(){ const m=document.getElementById('modal-loc'); if(m) m.remove(); _modalLoc=null; }

async function confirmarLocalizacao(linha,id){
  const setor=_modalLoc?_modalLoc.setor:'';
  const pos=_modalLoc?_modalLoc.pos:'';
  if(!setor){ msg('err','Escolha o setor.'); return; }
  fecharLocalizacao();
  alternar(linha,id,setor,pos);
}

async function alternar(linha,id,setor,pos){
  const ln=Number(linha);
  // atualização otimista — SÓ a peça daquela linha exata
  const p=PECAS.find(x=>Number(x.linha)===ln);
  if(p){
    p.status = p.status==='Disponivel' ? 'Faltando' : 'Disponivel';
    if(p.status==='Disponivel'){ p.setor=setor||''; p.posicao=pos?String(pos):''; }
    else { p.setor=''; p.posicao=''; }
    render();
  }
  let params='action=alternar_peca&usuario='+encodeURIComponent(USUARIO_LOGADO)+'&id_peca='+encodeURIComponent(id)+'&linha='+ln;
  if(setor) params+='&setor='+encodeURIComponent(setor);
  if(pos)   params+='&posicao='+encodeURIComponent(pos);
  const r=await api(params);
  if(r&&r.ok){
    if(p){ p.status=r.status; p.setor=r.setor||''; p.posicao=r.posicao||''; render(); }
    msg('ok',id+': '+r.status+(r.setor?' ('+r.setor+(r.posicao?' · '+r.posicao:'')+')':''));
  }else{
    msg('err','Falha ao salvar. Recarregando…');
    carregar();
  }
}

/* ── QR CODE das peças ── */
function mostrarCodigo(id,nome,serial){
  fecharQR();
  const usaBarras = serial && serial.trim()!=='';
  const m=document.createElement('div');
  m.id='modal-qr';
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;';
  m.innerHTML=`<div style="background:#fff;border-radius:14px;padding:22px;text-align:center;max-width:360px;">
    <div style="font-size:11px;color:#9CA3AF;margin-bottom:6px;">${usaBarras?'CÓDIGO DE BARRAS (serial '+serial+')':'QR CODE'}</div>
    <div id="codbox" style="display:flex;justify-content:center;margin-bottom:12px;">${usaBarras?'<svg id="barcode"></svg>':''}</div>
    <div style="font-size:16px;font-weight:700;">${id}</div>
    <div style="font-size:12px;color:#6B7280;margin-bottom:14px;">${nome||''}</div>
    <div style="display:flex;gap:8px;">
      <button onclick="fecharQR()" style="flex:1;padding:9px;background:#EEF0F4;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">Fechar</button>
      <button onclick="imprimirCodigo('${id}','${(nome||'').replace(/'/g,"\\'")}','${serial||''}')" style="flex:1;padding:9px;background:#185FA5;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;">🖨️ Imprimir</button>
    </div>
  </div>`;
  document.body.appendChild(m);
  if(usaBarras){
    // código de barras contém o SERIAL (é o que o leitor vai ler para identificar a peça)
    try{ JsBarcode('#barcode', serial, {format:'CODE128',displayValue:true,width:2,height:80,margin:8}); }
    catch(_){ document.getElementById('codbox').innerHTML='<div style="color:#E24B4A;font-size:12px;">Erro ao gerar código</div>'; }
  }else{
    new QRCode(document.getElementById('codbox'),{text:id,width:200,height:200});
  }
}
function fecharQR(){ const m=document.getElementById('modal-qr'); if(m) m.remove(); }

function imprimirCodigo(id,nome,serial){
  const usaBarras = serial && serial.trim()!=='';
  const cont=document.createElement('div');
  if(usaBarras){
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    cont.appendChild(svg);
    try{ JsBarcode(svg,serial,{format:'CODE128',displayValue:true,width:2,height:90,margin:8}); }catch(_){}
    setTimeout(()=>{
      const w=window.open('','_blank');
      w.document.write(`<div style="text-align:center;font-family:sans-serif;padding:30px;">
        ${cont.innerHTML}<div style="font-size:20px;font-weight:700;margin-top:6px;">${id}</div>
        <div style="font-size:13px;color:#555;">${nome||''}</div></div>`);
      w.document.close(); w.print();
    },200);
  }else{
    new QRCode(cont,{text:id,width:220,height:220});
    setTimeout(()=>{
      const img=cont.querySelector('img')||cont.querySelector('canvas');
      const src=img.tagName==='IMG'?img.src:img.toDataURL();
      const w=window.open('','_blank');
      w.document.write(`<div style="text-align:center;font-family:sans-serif;padding:30px;">
        <img src="${src}" style="width:220px;height:220px;"><div style="font-size:22px;font-weight:700;margin-top:8px;">${id}</div>
        <div style="font-size:14px;color:#555;">${nome||''}</div></div>`);
      w.document.close(); w.print();
    },200);
  }
}

function imprimirTodos(){
  const termo=(document.getElementById('busca').value||'').toLowerCase();
  const filtradas=PECAS.filter(p=>!termo || (p.id_peca||'').toLowerCase().includes(termo) || (p.nome_peca||'').toLowerCase().includes(termo));
  if(filtradas.length===0){ msg('err','Nenhuma peça para imprimir.'); return; }
  const w=window.open('','_blank');
  let html='<div style="font-family:sans-serif;display:flex;flex-wrap:wrap;gap:14px;padding:14px;">';
  let pendentes=filtradas.length;
  filtradas.forEach(p=>{
    const tmp=document.createElement('div');
    new QRCode(tmp,{text:p.id_peca,width:150,height:150});
    setTimeout(()=>{
      const img=tmp.querySelector('img')||tmp.querySelector('canvas');
      const src=img.tagName==='IMG'?img.src:img.toDataURL();
      html+=`<div style="text-align:center;border:1px solid #ddd;border-radius:8px;padding:10px;page-break-inside:avoid;">
        <img src="${src}" style="width:150px;height:150px;"><div style="font-size:15px;font-weight:700;">${p.id_peca}</div>
        <div style="font-size:11px;color:#666;">${p.nome_peca||''}</div></div>`;
      if(--pendentes===0){ html+='</div>'; w.document.write(html); w.document.close(); w.print(); }
    },150);
  });
}

function aoLogar(){ carregar(); }
checarLogin();
if(USUARIO_LOGADO) carregar();
