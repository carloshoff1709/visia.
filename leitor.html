*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0F1626;color:#fff;min-height:100vh;}
.top{padding:14px 18px;text-align:center;background:#1A2540;}
.top h1{font-size:16px;font-weight:700;}
.setor-badge{display:inline-block;margin-top:6px;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700;}
.b-cad{background:#8B5CF6;} .b-grc{background:#EF9F27;} .b-mont{background:#1D9E75;}
.escolha{padding:40px 20px;text-align:center;}
.escolha h2{font-size:16px;margin-bottom:6px;}
.escolha p{font-size:13px;color:#9CA3AF;margin-bottom:24px;}
.setores{display:flex;flex-direction:column;gap:12px;max-width:320px;margin:0 auto;}
.setores button{padding:18px;border:none;border-radius:12px;font-size:17px;font-weight:700;color:#fff;cursor:pointer;}
#reader{width:100%;max-width:480px;margin:0 auto;}
.leitura{padding:14px;}
.hint{text-align:center;font-size:12px;color:#9CA3AF;padding:10px 20px;}
.feed{max-width:480px;margin:10px auto;padding:0 14px;}
.f-item{display:flex;align-items:center;gap:10px;background:#1A2540;border-radius:10px;padding:10px 14px;margin-bottom:8px;animation:slideIn .3s;}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;}}
.f-item .ok{font-size:20px;}
.f-item .txt{flex:1;}
.f-item .id{font-size:14px;font-weight:700;}
.f-item .sub{font-size:11px;color:#9CA3AF;}
.f-item .hora{font-size:10px;color:#6B7280;}
.trocar{display:block;margin:14px auto;background:none;border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:14px 26px;border-radius:10px;font-size:15px;font-weight:700;z-index:100;display:none;box-shadow:0 6px 24px rgba(0,0,0,.4);}
.toast.ok{background:#1D9E75;color:#fff;} .toast.err{background:#E24B4A;color:#fff;}
.nav-voltar{position:fixed;top:10px;left:10px;z-index:50;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;text-decoration:none;}
.nav-voltar:hover{background:rgba(255,255,255,.2);}
</style>

<!-- Escolha do setor -->
<div class="escolha" id="escolha">
  <h2>Qual setor é este leitor?</h2>
  <p>Escolha uma vez. Fica gravado neste aparelho.</p>
  <div class="setores">
    <button class="b-mont" onclick="definirSetor('Montagem')">🏭 MONTAGEM</button>
    <button class="b-cad" onclick="definirSetor('CAD')">📐 CAD</button>
    <button class="b-grc" onclick="definirSetor('GRC')">🧱 GRC</button>
  </div>
</div>

<!-- Leitura -->
<div class="leitura" id="leitura" style="display:none;">
  <div id="reader"></div>
  <div class="hint">Aponte a câmera para o código de barras da peça. A leitura é automática.</div>
  <button class="trocar" onclick="trocarSetor()">↻ Trocar setor deste leitor</button>
  <div class="feed" id="feed"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const URL='https://script.google.com/macros/s/AKfycbyRmbuI33AEe4LJObYZZ4WPujjc3fyzAzHHMd1kli1pUQaar-Y99xulhfRgixecuoW0/exec';
let SETOR=localStorage.getItem('leitor_setor')||'';
let scanner=null;
let ultimaLeitura={id:'',t:0};

/* Permite fixar por link: leitor.html?setor=CAD */
const urlParams=new URLSearchParams(location.search);
if(urlParams.get('setor')){ SETOR=urlParams.get('setor'); localStorage.setItem('leitor_setor',SETOR); }

function classeSetor(s){ return s==='CAD'?'b-cad':s==='GRC'?'b-grc':'b-mont'; }
function mostrarBadge(){
  document.getElementById('badge-wrap').innerHTML=`<span class="setor-badge ${classeSetor(SETOR)}">Setor: ${SETOR}</span>`;
}

function definirSetor(s){
  SETOR=s; localStorage.setItem('leitor_setor',s);
  iniciar();
}
function trocarSetor(){
  if(scanner){ scanner.stop().catch(()=>{}); }
  document.getElementById('leitura').style.display='none';
  document.getElementById('escolha').style.display='block';
  document.getElementById('badge-wrap').innerHTML='';
}

function iniciar(){
  mostrarBadge();
  document.getElementById('escolha').style.display='none';
  document.getElementById('leitura').style.display='block';
  // Somente CODE 128 (+ QR como reserva) — lê exatamente o impresso, sem converter
  const formatos = (window.Html5QrcodeSupportedFormats) ? [
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.QR_CODE
  ] : undefined;
  scanner=new Html5Qrcode('reader', formatos ? {formatsToSupport:formatos} : undefined);
  // qrbox retangular — melhor para ler código de barras (largo e baixo)
  scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:280,height:130}},onScan,()=>{})
    .catch(err=>{ toast('err','Erro ao abrir câmera: '+err); });
}

function onScan(texto){
  // extrai o ID da peça: aceita ID puro (P001) ou um link contendo id_peca=
  let id=texto.trim();
  const m=texto.match(/[?&]id_peca=([^&]+)/);
  if(m) id=decodeURIComponent(m[1]);

  // evita ler a mesma peça repetidamente em menos de 3s
  const agora=Date.now();
  if(id===ultimaLeitura.id && (agora-ultimaLeitura.t)<3000) return;
  ultimaLeitura={id:id,t:agora};

  confirmarApontamento(id);
}

/* Diálogo de confirmação antes de marcar no setor */
function confirmarApontamento(id){
  // pausa o scanner enquanto confirma
  if(scanner){ scanner.pause(true); }
  const ehMontagem = SETOR.toLowerCase()==='montagem';
  const varalHtml = ehMontagem ? `
      <div style="font-size:13px;color:#6B7280;margin:14px 0 6px;">Local na Montagem:</div>
      <div id="conf-varal" style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:6px;">
        ${[1,2,3,4,5].map(n=>`<button onclick="selVaralConf(this,'${n}')" data-v="${n}" style="padding:12px 0;border:1px solid #D8DCE3;background:#EEF0F4;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;">${n}</button>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:6px;">
        <button onclick="selVaralConf(this,'Buffer Teto')" data-v="Buffer Teto" style="padding:12px 0;border:1px solid #D8DCE3;background:#EEF0F4;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">📦 Buffer Teto</button>
        <button onclick="selVaralConf(this,'Buffer Piso')" data-v="Buffer Piso" style="padding:12px 0;border:1px solid #D8DCE3;background:#EEF0F4;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">📦 Buffer Piso</button>
      </div>` : '';
  _varalConf='';
  const m=document.createElement('div');
  m.id='modal-conf';
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;';
  m.innerHTML=`
    <div style="background:#fff;color:#1A2540;border-radius:16px;padding:26px;max-width:360px;width:100%;text-align:center;">
      <div style="font-size:40px;margin-bottom:8px;">📍</div>
      <div style="font-size:15px;color:#6B7280;margin-bottom:4px;">Apontar a peça</div>
      <div style="font-size:22px;font-weight:800;margin-bottom:4px;">${id}</div>
      <div style="font-size:14px;margin-bottom:4px;">no setor <strong style="color:#185FA5;">${SETOR}</strong>?</div>
      ${varalHtml}
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button onclick="cancelarApontamento()" style="flex:1;padding:13px;background:#EEF0F4;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;">Cancelar</button>
        <button onclick="efetivarApontamento('${id.replace(/'/g,"\\'")}')" style="flex:1;padding:13px;background:#1D9E75;border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;">Confirmar</button>
      </div>
    </div>`;
  document.body.appendChild(m);
}
let _varalConf='';
function selVaralConf(btn,n){
  _varalConf=n;
  // limpa todos os botões de local (varal 1-5 e buffers)
  document.querySelectorAll('#modal-conf button[data-v]').forEach(b=>{b.style.background='#EEF0F4';b.style.color='#1A2540';b.style.borderColor='#D8DCE3';});
  btn.style.background='#185FA5';btn.style.color='#fff';btn.style.borderColor='#185FA5';
}
function fecharConf(){ const m=document.getElementById('modal-conf'); if(m) m.remove(); }
function cancelarApontamento(){
  fecharConf();
  ultimaLeitura={id:'',t:0}; // permite reler
  if(scanner){ try{ scanner.resume(); }catch(_){} }
}
function efetivarApontamento(id){
  const pos=_varalConf||'';
  fecharConf();
  if(scanner){ try{ scanner.resume(); }catch(_){} }
  marcar(id,pos);
}

let _cb=0;
function jsonp(params){
  return new Promise((res,rej)=>{
    const cb='__cb'+(_cb++);
    const s=document.createElement('script');
    const to=setTimeout(()=>{cleanup();rej(new Error('timeout'));},12000);
    function cleanup(){clearTimeout(to);delete window[cb];s.remove();}
    window[cb]=d=>{cleanup();res(d);};
    s.onerror=()=>{cleanup();rej(new Error('erro'));};
    s.src=URL+(URL.includes('?')?'&':'?')+params+'&callback='+cb+'&t='+Date.now();
    document.body.appendChild(s);
  });
}
async function api(params){
  // JSONP primeiro (contorna CORS do Apps Script); fetch como fallback
  try{ return await jsonp(params); }catch(_){}
  const full=URL+(URL.includes('?')?'&':'?')+params+'&t='+Date.now();
  try{ const r=await fetch(full,{cache:'no-store'}); if(r.ok){ return JSON.parse(await r.text()); } }catch(_){}
  const proxies=[u=>`https://corsproxy.io/?url=${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`];
  for(const px of proxies){ try{ const r=await fetch(px(full),{cache:'no-store'}); if(r.ok){ return JSON.parse(await r.text()); } }catch(_){} }
  return null;
}

/* ═══════════ FILA OFFLINE ═══════════
   Se a leitura falhar por falta de conexão, fica guardada no aparelho
   e é reenviada automaticamente quando a internet volta. */
const FILA_KEY='visia_fila_leitor';
function lerFila(){ try{ return JSON.parse(localStorage.getItem(FILA_KEY)||'[]'); }catch(_){ return []; } }
function salvarFila(f){ localStorage.setItem(FILA_KEY, JSON.stringify(f)); atualizarBadgeFila(); }
function enfileirar(item){ const f=lerFila(); f.push(item); salvarFila(f); }

function atualizarBadgeFila(){
  const n=lerFila().length;
  let el=document.getElementById('fila-badge');
  if(!el){
    el=document.createElement('div'); el.id='fila-badge';
    el.style.cssText='position:fixed;bottom:14px;right:14px;z-index:60;background:#EF9F27;color:#1A2540;font-weight:700;font-size:13px;padding:10px 16px;border-radius:24px;box-shadow:0 4px 16px rgba(0,0,0,.3);cursor:pointer;display:none;';
    el.onclick=sincronizarFila;
    document.body.appendChild(el);
  }
  if(n>0){ el.style.display='block'; el.textContent='⏳ '+n+' pendente(s) — tocar p/ enviar'; }
  else{ el.style.display='none'; }
}

async function marcar(id,pos){
  pos=pos||'';
  const u=sessionStorage.getItem('visia_user')||'';
  const agora=new Date();
  const quando=agora.getFullYear()+'-'+String(agora.getMonth()+1).padStart(2,'0')+'-'+String(agora.getDate()).padStart(2,'0')+' '+String(agora.getHours()).padStart(2,'0')+':'+String(agora.getMinutes()).padStart(2,'0')+':'+String(agora.getSeconds()).padStart(2,'0');

  // sem conexão? vai direto para a fila
  if(!navigator.onLine){
    enfileirar({id,setor:SETOR,usuario:u,quando,posicao:pos});
    beep();
    addFeed('📥', id, 'guardado (offline) → '+SETOR+(pos?(' varal '+pos):''));
    toast('ok','Sem internet — guardado na fila');
    return;
  }

  toast('ok','Lendo '+id+'…');
  const r=await api('action=receber_peca&id_peca='+encodeURIComponent(id)+'&setor='+encodeURIComponent(SETOR)+(u?'&usuario='+encodeURIComponent(u):'')+'&quando='+encodeURIComponent(quando)+(pos?'&posicao='+encodeURIComponent(pos):''));
  if(r&&r.ok){
    beep();
    const unid = (r.total>1) ? ` [${r.unidade}/${r.total}]` : '';
    addFeed('✅', (r.id_peca||id)+unid, (r.nome||'')+' → '+SETOR+(pos?(' · varal '+pos):''));
    toast('ok',(r.id_peca||id)+' em '+SETOR+unid);
  }else if(r&&r.todas_marcadas){
    addFeed('⚠️', id, 'todas as '+r.total+' unidade(s) já em '+SETOR);
    toast('err','Todas já em '+SETOR);
  }else if(r===null){
    enfileirar({id,setor:SETOR,usuario:u,quando,posicao:pos});
    beep();
    addFeed('📥', id, 'guardado (sem resposta) → '+SETOR);
    toast('ok','Conexão instável — guardado na fila');
  }else{
    addFeed('❌', id, (r&&r.erro)||'não cadastrada');
    toast('err',id+': '+((r&&r.erro)||'falha'));
  }
}

let _sincronizando=false;
async function sincronizarFila(){
  if(_sincronizando) return;
  const fila=lerFila();
  if(fila.length===0) return;
  if(!navigator.onLine){ toast('err','Ainda sem internet'); return; }
  _sincronizando=true;
  toast('ok','Enviando '+fila.length+' leitura(s)…');
  const restantes=[];
  for(const item of fila){
    const u=item.usuario||'';
    const r=await api('action=receber_peca&id_peca='+encodeURIComponent(item.id)+'&setor='+encodeURIComponent(item.setor)+(u?'&usuario='+encodeURIComponent(u):'')+'&quando='+encodeURIComponent(item.quando||'')+(item.posicao?'&posicao='+encodeURIComponent(item.posicao):''));
    if(r&&(r.ok||r.todas_marcadas)){
      addFeed('☁️', item.id, 'sincronizado → '+item.setor);
    }else if(r===null){
      restantes.push(item); // ainda sem rede, mantém na fila
    }else{
      // erro real (ex: peça não existe): tira da fila mas avisa
      addFeed('❌', item.id, 'erro ao sincronizar: '+((r&&r.erro)||'falha'));
    }
  }
  salvarFila(restantes);
  _sincronizando=false;
  if(restantes.length===0) toast('ok','Fila sincronizada!');
  else toast('err',restantes.length+' ainda pendente(s)');
}

// reenvia automaticamente quando a conexão volta
window.addEventListener('online', ()=>{ toast('ok','Internet voltou — sincronizando…'); sincronizarFila(); });
window.addEventListener('offline', ()=>{ toast('err','Sem internet — leituras vão para a fila'); });

function addFeed(icone,id,sub){
  const feed=document.getElementById('feed');
  const hora=new Date().toLocaleTimeString('pt-BR');
  const div=document.createElement('div');
  div.className='f-item';
  div.innerHTML=`<span class="ok">${icone}</span><div class="txt"><div class="id">${id}</div><div class="sub">${sub}</div></div><span class="hora">${hora}</span>`;
  feed.insertBefore(div, feed.firstChild);
  while(feed.children.length>15) feed.removeChild(feed.lastChild);
}

let _ac=null;
function beep(){
  try{
    _ac=_ac||new (window.AudioContext||window.webkitAudioContext)();
    const o=_ac.createOscillator(), g=_ac.createGain();
    o.connect(g); g.connect(_ac.destination);
    o.type='sine'; o.frequency.value=1046;
    g.gain.setValueAtTime(0.001,_ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.4,_ac.currentTime+0.03);
    g.gain.exponentialRampToValueAtTime(0.001,_ac.currentTime+0.25);
    o.start(); o.stop(_ac.currentTime+0.25);
  }catch(_){}
}

function toast(t,txt){const el=document.getElementById('toast');el.className='toast '+t;el.textContent=txt;el.style.display='block';clearTimeout(el._to);el._to=setTimeout(()=>el.style.display='none',2200);}

/* Se já tem setor salvo, inicia direto */
if(SETOR){ iniciar(); }
atualizarBadgeFila();
if(navigator.onLine) sincronizarFila();
</script>
